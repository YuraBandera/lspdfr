<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Profinevski Studio</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #ffffff;
            --text-secondary: #888888;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--accent-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Анімований фон - плавні плями світла */
        .background-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0a0a0a 100%);
            z-index: -1;
        }

        .glow-orb {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            animation: move 20s infinite alternate ease-in-out;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        .content {
            text-align: center;
            letter-spacing: -0.02em;
        }

        /* Тонка лінія зверху для акценту */
        .line {
            width: 40px;
            height: 1px;
            background: var(--accent-color);
            margin: 0 auto 30px;
            opacity: 0.5;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin: 0 0 15px 0;
        }

        p {
            font-size: 1rem;
            color: var(--text-secondary);
            max-width: 400px;
            margin: 0 auto 40px;
            line-height: 1.6;
            font-weight: 300;
        }

        .studio-name {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: var(--accent-color);
            margin-top: 50px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .studio-name:hover {
            opacity: 1;
        }

        /* Анімація появи тексту */
        .fade-in {
            animation: fadeIn 2.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="background-glow">
        <div class="glow-orb"></div>
    </div>

    <div class="content fade-in">
        <div class="line"></div>
        <h1>Updating</h1>
        <p>Ми вдосконалюємо платформу для нового досвіду. Зачекайте, ми скоро повернемось.</p>
        
        <div class="studio-name">
            Profinevski Studio
        </div>
    </div>

</body>
</html>
