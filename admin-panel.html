<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" href="https://cdn.discordapp.com/attachments/1277601608808792206/1386076400716349491/file_00000000ac58620a847b789ba3bbb3a1.png?ex=685863bd&is=6857123d&hm=7786eebf5a8bd7e46359b50a4bf90e57492ea902f9d73bcf5e3b642a40156982&" type="image/png">
  <title>Адмін панель | LSPDFR ELITE STUDIO</title>
  <style>
    :root {
      --primary-bg: #0a0a0f;
      --secondary-bg: #12121a;
      --card-bg: rgba(26, 26, 35, 0.6);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-muted: rgba(255, 255, 255, 0.4);
      --accent-blue: #3b82f6;
      --accent-blue-hover: #2563eb;
      --accent-green: #10b981;
      --accent-green-hover: #059669;
      --accent-red: #ef4444;
      --accent-red-hover: #dc2626;
      --accent-yellow: #f59e0b;
      --accent-purple: #8b5cf6;
      --accent-pink: #ec4899;
      --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --gradient-glow: linear-gradient(135deg, rgba(102, 126, 234, 0.3) 0%, rgba(118, 75, 162, 0.3) 100%);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.5);
      --shadow-glow: 0 0 40px rgba(102, 126, 234, 0.2);
      --border-radius: 16px;
      --border-radius-sm: 8px;
      --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-fast: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--primary-bg);
      color: var(--text-primary);
      min-height: 100vh;
      background-image: 
        radial-gradient(ellipse at 20% 20%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 40% 60%, rgba(16, 185, 129, 0.08) 0%, transparent 40%),
        linear-gradient(180deg, #0a0a0f 0%, #12121a 100%);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--secondary-bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--accent-blue);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent-blue-hover);
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Logout Button */
    .logout-btn {
      position: fixed;
      top: 24px;
      right: 24px;
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, rgba(220, 38, 38, 0.3) 100%);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: white;
      padding: 12px 20px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 1000;
      font-size: 14px;
      font-weight: 500;
      transition: var(--transition);
      backdrop-filter: blur(10px);
    }

    .logout-btn:hover {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.4) 0%, rgba(220, 38, 38, 0.5) 100%);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(239, 68, 68, 0.3);
    }

    .logout-btn i {
      transition: var(--transition-fast);
    }

    .logout-btn:hover i {
      transform: translateX(-4px);
    }

    /* Header */
    .header {
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
      animation: slideDown 0.6s ease-out;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--gradient-primary);
    }

    .header::after {
      content: "";
      position: absolute;
      top: -50%;
      right: -20%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .header-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      box-shadow: var(--shadow-md), var(--shadow-glow);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow: var(--shadow-md), var(--shadow-glow);
      }
      50% {
        box-shadow: var(--shadow-md), 0 0 60px rgba(102, 126, 234, 0.4);
      }
    }

    .title-section h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 4px;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .title-section p {
      color: var(--text-secondary);
      font-size: 15px;
      letter-spacing: 0.3px;
    }

    .stats-section {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .stat-item {
      text-align: center;
      padding: 20px 28px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .stat-item::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--gradient-primary);
      opacity: 0;
      transition: var(--transition);
    }

    .stat-item:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .stat-item:hover::before {
      opacity: 1;
    }

    .stat-number {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      font-weight: 700;
      display: block;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* Admin Panel */
    .admin-panel {
      display: flex;
      gap: 28px;
      margin-bottom: 28px;
    }

    @media (max-width: 1024px) {
      .admin-panel {
        flex-direction: column;
      }
    }

    /* Sidebar */
    .admin-sidebar {
      width: 280px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(20px);
      height: fit-content;
      position: sticky;
      top: 24px;
      animation: slideRight 0.6s ease-out;
    }

    @keyframes slideRight {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @media (max-width: 1024px) {
      .admin-sidebar {
        width: 100%;
        position: static;
      }
    }

    .admin-menu {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .admin-menu-item {
      margin-bottom: 8px;
    }

    .admin-menu-link {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      color: var(--text-secondary);
      text-decoration: none;
      border-radius: 14px;
      transition: var(--transition);
      font-weight: 500;
      position: relative;
      overflow: hidden;
    }

    .admin-menu-link::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 3px;
      background: var(--gradient-primary);
      border-radius: 0 4px 4px 0;
      transform: scaleY(0);
      transition: var(--transition);
    }

    .admin-menu-link:hover {
      background: var(--glass-bg);
      color: var(--text-primary);
      transform: translateX(6px);
    }

    .admin-menu-link:hover::before {
      transform: scaleY(1);
    }

    .admin-menu-link.active {
      background: var(--glass-bg);
      color: var(--text-primary);
      border: 1px solid var(--glass-border);
    }

    .admin-menu-link.active::before {
      transform: scaleY(1);
    }

    .admin-menu-link i {
      width: 22px;
      text-align: center;
      font-size: 18px;
      transition: var(--transition);
    }

    .admin-menu-link:hover i {
      transform: scale(1.1);
    }

    /* Main Content */
    .admin-content {
      flex: 1;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 28px;
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(20px);
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .admin-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 28px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .admin-title i {
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 24px;
    }

    /* Ideas Container */
    .ideas-container {
      background: var(--secondary-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .ideas-header {
      padding: 24px 28px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);
    }

    .ideas-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .ideas-actions {
      display: flex;
      gap: 12px;
    }

    .action-btn {
      padding: 12px 20px;
      background: var(--gradient-primary);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .action-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
    }

    .action-btn i {
      transition: var(--transition);
    }

    .action-btn:hover i {
      transform: rotate(180deg);
    }

    .action-btn.danger {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.8) 0%, rgba(220, 38, 38, 0.9) 100%);
    }

    .action-btn.danger:hover {
      box-shadow: 0 8px 24px rgba(239, 68, 68, 0.4);
    }

    /* Ideas List */
    .ideas-list {
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .idea-item {
      padding: 24px 28px;
      border-bottom: 1px solid var(--border-color);
      transition: var(--transition);
      animation: slideIn 0.4s ease-out backwards;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .idea-item:hover {
      background: linear-gradient(90deg, rgba(102, 126, 234, 0.05) 0%, transparent 100%);
    }

    .idea-item:last-child {
      border-bottom: none;
    }

    .idea-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 16px;
    }

    .idea-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .idea-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .idea-category {
      padding: 6px 14px;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(59, 130, 246, 0.1) 100%);
      color: var(--accent-blue);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .idea-date {
      font-size: 13px;
      color: var(--text-muted);
    }

    .idea-content {
      color: var(--text-secondary);
      margin-bottom: 20px;
      line-height: 1.7;
    }

    .idea-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .idea-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .author-avatar {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: var(--gradient-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: 600;
      box-shadow: var(--shadow-sm);
    }

    .author-name {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .idea-votes {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--glass-bg);
      border-radius: 12px;
      border: 1px solid var(--glass-border);
    }

    .vote-count {
      font-size: 16px;
      font-weight: 700;
      min-width: 24px;
      text-align: center;
      color: var(--accent-yellow);
    }

    /* Admin Controls */
    .admin-controls {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border-color);
      flex-wrap: wrap;
      animation: fadeIn 0.4s ease-out 0.2s backwards;
    }

    .status-select {
      padding: 12px 18px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 14px;
      cursor: pointer;
      transition: var(--transition);
      min-width: 150px;
    }

    .status-select:hover {
      border-color: var(--accent-blue);
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
    }

    .status-select:focus {
      outline: none;
      border-color: var(--accent-blue);
    }

    .save-btn {
      padding: 12px 20px;
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.8) 0%, rgba(5, 150, 105, 0.9) 100%);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .save-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4);
    }

    .delete-btn {
      padding: 12px 20px;
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.8) 0%, rgba(220, 38, 38, 0.9) 100%);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .delete-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(239, 68, 68, 0.4);
    }

    /* Status badges */
    .status-badge {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    .status-pending {
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.2) 0%, rgba(245, 158, 11, 0.1) 100%);
      color: var(--accent-yellow);
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .status-review {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(59, 130, 246, 0.1) 100%);
      color: var(--accent-blue);
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .status-approved {
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.2) 0%, rgba(16, 185, 129, 0.1) 100%);
      color: var(--accent-green);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .status-rejected {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, rgba(239, 68, 68, 0.1) 100%);
      color: var(--accent-red);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 24px;
      background: var(--glass-bg);
      border-top: 1px solid var(--border-color);
    }

    .pagination-btn {
      padding: 10px 16px;
      background: transparent;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
      font-size: 14px;
      font-weight: 500;
    }

    .pagination-btn:hover:not(:disabled) {
      background: var(--gradient-primary);
      color: white;
      border-color: transparent;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }

    .pagination-btn.active {
      background: var(--gradient-primary);
      color: white;
      border-color: transparent;
    }

    .pagination-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .pagination-info {
      margin: 0 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--text-muted);
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
      opacity: 0.3;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    .empty-state p {
      font-size: 18px;
      color: var(--text-secondary);
    }

    /* Loading Spinner */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
      gap: 20px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--border-color);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading span {
      color: var(--text-secondary);
      font-size: 15px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 16px;
      }

      .header {
        padding: 24px;
      }

      .header-content {
        flex-direction: column;
        text-align: center;
      }

      .logo-section {
        flex-direction: column;
      }

      .title-section h1 {
        font-size: 24px;
      }

      .stats-section {
        justify-content: center;
        width: 100%;
      }

      .stat-item {
        flex: 1;
        min-width: 100px;
        padding: 16px;
      }

      .stat-number {
        font-size: 24px;
      }

      .idea-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .idea-meta {
        width: 100%;
        justify-content: flex-start;
      }

      .pagination {
        flex-wrap: wrap;
      }

      .admin-controls {
        flex-direction: column;
      }

      .status-select, .save-btn, .delete-btn {
        width: 100%;
        justify-content: center;
      }
    }

    /* Toast Notifications */
    .toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .toast {
      padding: 16px 24px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      color: white;
      font-size: 14px;
      font-weight: 500;
      backdrop-filter: blur(20px);
      animation: slideInRight 0.4s ease-out;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(100px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .toast.success {
      border-color: rgba(16, 185, 129, 0.5);
    }

    .toast.error {
      border-color: rgba(239, 68, 68, 0.5);
    }

    .toast i {
      font-size: 18px;
    }

    .toast.success i {
      color: var(--accent-green);
    }

    .toast.error i {
      color: var(--accent-red);
    }
  </style>
</head>
<body>
  <button class="logout-btn" onclick="logout()">
    <i class="fas fa-sign-out-alt"></i> Вийти
  </button>

  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-content">
        <div class="logo-section">
          <img src="images/logo.jpg" alt="LSPDFR ELITE STUDIO Logo" class="logo">
          <div class="title-section">
            <h1>Адмін панель</h1>
            <p>Керування ідеями для модифікацій</p>
          </div>
        </div>
        <div class="stats-section">
          <div class="stat-item">
            <span class="stat-number" id="totalIdeas">0</span>
            <span class="stat-label">Всього ідей</span>
          </div>
          <div class="stat-item">
            <span class="stat-number" id="approvedIdeas">0</span>
            <span class="stat-label">Схвалено</span>
          </div>
          <div class="stat-item">
            <span class="stat-number" id="pendingIdeas">0</span>
            <span class="stat-label">На розгляді</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Admin Content -->
    <div class="admin-panel">
      <!-- Sidebar -->
      <div class="admin-sidebar">
        <ul class="admin-menu">
          <li class="admin-menu-item">
            <a href="#" class="admin-menu-link active" onclick="showSection('ideas')">
              <i class="fas fa-lightbulb"></i> Усі ідеї
            </a>
          </li>
          <li class="admin-menu-item">
            <a href="#" class="admin-menu-link" onclick="showSection('pending')">
              <i class="fas fa-clock"></i> На розгляді
            </a>
          </li>
          <li class="admin-menu-item">
            <a href="#" class="admin-menu-link" onclick="showSection('review')">
              <i class="fas fa-cog"></i> В роботі
            </a>
          </li>
          <li class="admin-menu-item">
            <a href="#" class="admin-menu-link" onclick="showSection('approved')">
              <i class="fas fa-check-circle"></i> Схвалено
            </a>
          </li>
          <li class="admin-menu-item">
            <a href="#" class="admin-menu-link" onclick="showSection('rejected')">
              <i class="fas fa-times-circle"></i> Відхилено
            </a>
          </li>
        </ul>
      </div>

      <!-- Main Content -->
      <div class="admin-content">
        <h2 class="admin-title"><i class="fas fa-lightbulb"></i> Усі ідеї</h2>
        
        <!-- Ideas List -->
        <div class="ideas-container">
          <div class="ideas-header">
            <h3 class="ideas-title">Список ідей</h3>
            <div class="ideas-actions">
              <button class="action-btn" onclick="refreshIdeas()">
                <i class="fas fa-sync-alt"></i> Оновити
              </button>
            </div>
          </div>
          
          <ul class="ideas-list" id="ideasList">
            <li class="idea-item">
              <div class="loading">
                <div class="spinner"></div>
                <span>Завантаження ідей...</span>
              </div>
            </li>
          </ul>

          <!-- Pagination -->
          <div class="pagination" id="pagination">
            <button class="pagination-btn" id="prevBtn" onclick="changePage(-1)">
              <i class="fas fa-chevron-left"></i>
            </button>
            <div id="pageNumbers"></div>
            <button class="pagination-btn" id="nextBtn" onclick="changePage(1)">
              <i class="fas fa-chevron-right"></i>
            </button>
            <div class="pagination-info" id="paginationInfo"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.2/firebase-app.js";
    import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.17.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCgvuGxx5D6ZIMnn-SBV2zJibz15qusuB8",
      authDomain: "lspdfr-elite-studio.firebaseapp.com",
      databaseURL: "https://lspdfr-elite-studio-default-rtdb.firebaseio.com",
      projectId: "lspdfr-elite-studio",
      storageBucket: "lspdfr-elite-studio.firebasestorage.app",
      messagingSenderId: "262833616815",
      appId: "1:262833616815:web:f63b8325ce8e923c2be15a",
      measurementId: "G-Y7J0HC6N0L"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    // Check authorization
    if(localStorage.getItem('adminLoggedIn') !== 'true') {
      window.location.href = 'admin.html';
    }

    // Logout function
    window.logout = function() {
      localStorage.removeItem('adminLoggedIn');
      window.location.href = 'admin.html';
    };

    // DOM elements
    const ideasList = document.getElementById('ideasList');
    const totalIdeas = document.getElementById('totalIdeas');
    const approvedIdeas = document.getElementById('approvedIdeas');
    const pendingIdeas = document.getElementById('pendingIdeas');

    // Global variables
    let allIdeas = [];
    let filteredIdeas = [];
    let currentPage = 1;
    let itemsPerPage = 10;
    let currentFilter = 'all';

    // Category names
    const categoryNames = {
      vehicle: 'Транспорт',
      skin: 'Скіни',
      script: 'Скрипти',
      map: 'Мапи',
      other: 'Інше'
    };

    // Status names
    const statusNames = {
      pending: { class: 'status-pending', text: 'На розгляді' },
      review: { class: 'status-review', text: 'В роботі' },
      approved: { class: 'status-approved', text: 'Схвалено' },
      rejected: { class: 'status-rejected', text: 'Відхилено' }
    };

    // Show toast notification
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
        <span>${message}</span>
      `;
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.style.animation = 'slideInRight 0.4s ease-out reverse';
        setTimeout(() => toast.remove(), 400);
      }, 3000);
    }

    // Show different sections
    window.showSection = function(section) {
      // Update active menu item
      document.querySelectorAll('.admin-menu-link').forEach(link => {
        link.classList.remove('active');
      });
      event.target.classList.add('active');
      
      // Update title
      const title = document.querySelector('.admin-title');
      const titleIcon = title.querySelector('i');
      
      const titles = {
        ideas: '<i class="fas fa-lightbulb"></i> Усі ідеї',
        pending: '<i class="fas fa-clock"></i> Ідеї на розгляді',
        review: '<i class="fas fa-cog"></i> Ідеї в роботі',
        approved: '<i class="fas fa-check-circle"></i> Схвалені ідеї',
        rejected: '<i class="fas fa-times-circle"></i> Відхилені ідеї'
      };
      
      title.innerHTML = titles[section] || titles.ideas;
      
      currentFilter = section;
      currentPage = 1;
      filterIdeas(currentFilter);
    };

    // Fetch ideas from Firebase
    function fetchIdeas() {
      const ideasRef = ref(database, 'ideas');
      
      onValue(ideasRef, (snapshot) => {
        if (snapshot.exists()) {
          const data = snapshot.val();
          allIdeas = Object.keys(data).map(key => ({
            id: key,
            ...data[key]
          })).sort((a, b) => b.createdAt - a.createdAt);
          
          updateStats();
          filterIdeas(currentFilter);
        } else {
          allIdeas = [];
          showNoIdeas();
          updateStats();
        }
      }, (error) => {
        console.error("Error getting ideas:", error);
        showError();
      });
    }

    // Update statistics
    function updateStats() {
      totalIdeas.textContent = allIdeas.length;
      approvedIdeas.textContent = allIdeas.filter(i => i.status === 'approved').length;
      pendingIdeas.textContent = allIdeas.filter(i => i.status === 'pending').length;
    }

    // Filter ideas
    window.filterIdeas = function(filter) {
      currentFilter = filter;
      currentPage = 1;
      
      if (filter === 'all') {
        filteredIdeas = [...allIdeas];
      } else {
        filteredIdeas = allIdeas.filter(i => i.status === filter);
      }
      
      renderIdeas();
      renderPagination();
    };

    // Render ideas
    function renderIdeas() {
      if (filteredIdeas.length === 0) {
        showNoIdeas();
        return;
      }
      
      const startIndex = (currentPage - 1) * itemsPerPage;
      const endIndex = startIndex + itemsPerPage;
      const pageIdeas = filteredIdeas.slice(startIndex, endIndex);
      
      ideasList.innerHTML = pageIdeas.map((idea, index) => createIdeaItem(idea, index)).join('');
      
      // Add animation delay to items
      setTimeout(() => {
        document.querySelectorAll('.idea-item').forEach((item) => {
          item.style.animationPlayState = 'running';
        });
      }, 10);
    }

    // Create idea item HTML with admin controls
    function createIdeaItem(idea, index) {
      const date = new Date(idea.createdAt).toLocaleDateString('uk-UA');
      const initials = idea.userName ? idea.userName.split(' ').map(n => n[0]).join('').toUpperCase() : 'A';
      const status = statusNames[idea.status] || statusNames.pending;
      
      return `
        <li class="idea-item" style="animation-delay: ${index * 80}ms;">
          <div class="idea-header">
            <h4 class="idea-title">${idea.title || 'Без назви'}</h4>
            <div class="idea-meta">
              <span class="idea-category">${categoryNames[idea.category] || 'Інше'}</span>
              <span class="status-badge ${status.class}">${status.text}</span>
              <span class="idea-date">${date}</span>
            </div>
          </div>
          <div class="idea-content">${idea.description || 'Опис відсутній'}</div>
          <div class="idea-footer">
            <div class="idea-author">
              <div class="author-avatar" title="${idea.userName || 'Анонім'}">${initials}</div>
              <span class="author-name">${idea.userName || 'Анонім'}</span>
            </div>
            <div class="idea-votes">
              <i class="fas fa-heart" style="color: var(--accent-pink);"></i>
              <span class="vote-count">${idea.votes || 0}</span>
            </div>
          </div>
          <div class="admin-controls">
            <select class="status-select" id="status-${idea.id}">
              <option value="pending" ${idea.status === 'pending' ? 'selected' : ''}>На розгляді</option>
              <option value="review" ${idea.status === 'review' ? 'selected' : ''}>В роботі</option>
              <option value="approved" ${idea.status === 'approved' ? 'selected' : ''}>Схвалено</option>
              <option value="rejected" ${idea.status === 'rejected' ? 'selected' : ''}>Відхилено</option>
            </select>
            <button class="save-btn" onclick="saveIdeaStatus('${idea.id}')">
              <i class="fas fa-save"></i> Зберегти
            </button>
            <button class="delete-btn" onclick="deleteIdea('${idea.id}')">
              <i class="fas fa-trash-alt"></i> Видалити
            </button>
          </div>
        </li>
      `;
    }

    // Show empty state
    function showNoIdeas() {
      ideasList.innerHTML = `
        <li class="idea-item">
          <div class="empty-state">
            <div class="empty-icon">
              <i class="fas fa-lightbulb"></i>
            </div>
            <p>Ідей не знайдено</p>
          </div>
        </li>
      `;
    }

    // Show error state
    function showError() {
      ideasList.innerHTML = `
        <li class="idea-item">
          <div class="empty-state">
            <div class="empty-icon" style="color: var(--accent-red);">
              <i class="fas fa-exclamation-triangle"></i>
            </div>
            <p>Помилка завантаження ідей</p>
            <button class="action-btn" onclick="fetchIdeas()" style="margin-top: 16px;">
              <i class="fas fa-redo"></i> Спробувати знову
            </button>
          </div>
        </li>
      `;
    }

    // Save idea status
    window.saveIdeaStatus = function(id) {
      const statusSelect = document.getElementById(`status-${id}`);
      const newStatus = statusSelect.value;
      
      const ideaRef = ref(database, `ideas/${id}`);
      update(ideaRef, {
        status: newStatus,
        updatedAt: Date.now()
      }).then(() => {
        showToast('Статус ідеї успішно оновлено!', 'success');
        fetchIdeas();
      }).catch((error) => {
        console.error("Error updating status:", error);
        showToast('Сталася помилка при оновленні статусу', 'error');
      });
    };

    // Delete idea
    window.deleteIdea = function(id) {
      if (confirm('Ви впевнені, що хочете видалити цю ідею? Цю дію неможливо скасувати.')) {
        const ideaRef = ref(database, `ideas/${id}`);
        remove(ideaRef).then(() => {
          showToast('Ідею успішно видалено!', 'success');
          fetchIdeas();
        }).catch((error) => {
          console.error("Error deleting idea:", error);
          showToast('Сталася помилка при видаленні ідеї', 'error');
        });
      }
    };

    // Refresh ideas
    window.refreshIdeas = function() {
      ideasList.innerHTML = `
        <li class="idea-item">
          <div class="loading">
            <div class="spinner"></div>
            <span>Оновлення списку...</span>
          </div>
        </li>
      `;
      fetchIdeas();
      showToast('Список ідей оновлено', 'success');
    };

    // Pagination functions
    window.changePage = function(direction) {
      const totalPages = Math.ceil(filteredIdeas.length / itemsPerPage);
      const newPage = currentPage + direction;
      
      if (newPage >= 1 && newPage <= totalPages) {
        currentPage = newPage;
        renderIdeas();
        renderPagination();
        
        // Scroll to top of list
        document.querySelector('.ideas-container').scrollIntoView({ behavior: 'smooth' });
      }
    };

    function renderPagination() {
      const totalPages = Math.ceil(filteredIdeas.length / itemsPerPage);
      const pageNumbers = document.getElementById('pageNumbers');
      const paginationInfo = document.getElementById('paginationInfo');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');

      // Update buttons
      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === totalPages || totalPages === 0;

      // Update info
      const startItem = (currentPage - 1) * itemsPerPage + 1;
      const endItem = Math.min(currentPage * itemsPerPage, filteredIdeas.length);
      paginationInfo.textContent = `${startItem}-${endItem} з ${filteredIdeas.length}`;

      // Generate page numbers
      let pages = [];
      const maxVisiblePages = 5;
      
      if (totalPages <= maxVisiblePages) {
        pages = Array.from({ length: totalPages }, (_, i) => i + 1);
      } else {
        const start = Math.max(1, currentPage - 2);
        const end = Math.min(totalPages, start + maxVisiblePages - 1);
        pages = Array.from({ length: end - start + 1 }, (_, i) => start + i);
      }

      pageNumbers.innerHTML = pages.map(page => `
        <button class="pagination-btn ${page === currentPage ? 'active' : ''}" onclick="goToPage(${page})">
          ${page}
        </button>
      `).join('');
    }

    window.goToPage = function(page) {
      currentPage = page;
      renderIdeas();
      renderPagination();
      document.querySelector('.ideas-container').scrollIntoView({ behavior: 'smooth' });
    };

    // Initialize
    window.onload = () => {
      fetchIdeas();
      
      // Auto-refresh every 30 seconds
      setInterval(fetchIdeas, 30000);
    };
  </script>
</body>
</html>
